name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go-quality:
    name: go-quality (go 1.20.x)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Check formatting (gofmt)
        shell: bash
        run: |
          files="$(git ls-files '*.go')"
          if [ -z "$files" ]; then
            exit 0
          fi
          unformatted="$(gofmt -l $files)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            echo "::error title=gofmt required::Run gofmt on the files above."
            exit 1
          fi

      - name: Check imports (goimports)
        shell: bash
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.14.0
          files="$(git ls-files '*.go')"
          if [ -z "$files" ]; then
            exit 0
          fi
          unformatted="$(goimports -l $files)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            echo "::error title=goimports required::Run goimports on the files above."
            exit 1
          fi
